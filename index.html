<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InventARG</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <div class="top-bar">
        <h1>InventARG</h1>
        <button id="theme-toggle" type="button">Modo oscuro</button>
      </div>

      <form id="product-form">
        <input name="name" placeholder="Nombre" required />
        <input name="category" placeholder="Categoría" />
        <input name="price" type="number" placeholder="Precio" required />
        <input name="stock" type="number" placeholder="Stock" required />
        <div class="form-actions">
          <button type="submit">Agregar</button>
          <button type="button" id="cancel-edit" class="secondary">Cancelar</button>
        </div>
      </form>

      <input id="import-file" type="file" accept="application/json" class="hidden" />

      <section class="list-section">
        <div class="list-header">
          <h2>Lista de productos</h2>
          <div class="export-import-actions">
            <button type="button" id="export-json">Exportar JSON</button>
            <button type="button" id="import-json">Importar JSON</button>
          </div>
        </div>
        <button type="button" id="search-toggle-name">Buscar por nombre</button>
        <button type="button" id="search-toggle-category">Buscar por categoría</button>
        <input id="product-search" type="search" placeholder="Buscar por nombre" class="hidden" />
        <ul id="product-list" class="product-list"></ul>
      </section>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
