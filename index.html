<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InventARG</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <div class="top-bar">
        <h1>InventARG</h1>
        <button id="theme-toggle" type="button">Modo oscuro</button>
      </div>

      <form id="product-form">
        <input name="name" placeholder="Nombre" required />
        <input name="price" type="number" placeholder="Precio" required />
        <input name="stock" type="number" placeholder="Stock" required />
        <div class="form-actions">
          <button type="submit">Agregar</button>
          <button type="button" id="cancel-edit" class="secondary">Cancelar</button>
        </div>
      </form>

      <section class="list-section">
        <h2>Lista de productos</h2>
        <input id="product-search" type="search" placeholder="Buscar por nombre" />
        <ul id="product-list" class="product-list"></ul>
      </section>
    </main>

    <script type="module" src="./functions/app.js"></script>
  </body>
</html>
